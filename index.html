<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYS STUDIO</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    background: #070707;
    color: white;
    font-family: Arial, sans-serif;
}

header {
    border-bottom: 1px solid #222;
    padding: 22px 8%;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.logo {
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 8px;
}

nav a {
    color: #aaa;
    text-decoration: none;
    margin: 0 14px;
    font-size: 13px;
    font-weight: bold;
    letter-spacing: 3px;
}

nav a.active { color: #00ffb3; }

.discord {
    border: 1px solid #333;
    border-radius: 25px;
    padding: 10px 18px;
    color: white;
    text-decoration: none;
    font-size: 13px;
}

.container {
    width: 85%;
    margin: 45px auto;
}

.search {
    width: 100%;
    background: #111;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 16px;
    color: white;
    font-size: 15px;
    margin-bottom: 35px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 25px;
}

.card {
    background: #111;
    border: 1px solid #252525;
    border-radius: 8px;
    overflow: hidden;
}

.image {
    height: 180px;
    background: linear-gradient(135deg, #111, #222, #00ffb3);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.image span {
    font-size: 30px;
    font-weight: bold;
    text-transform: uppercase;
    text-decoration: underline;
    letter-spacing: 2px;
}

.info {
    padding: 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.info h2 {
    font-size: 17px;
    margin: 0;
}

.price {
    color: #00ffb3;
    font-weight: bold;
    font-size: 14px;
}

.badge {
    background: #00ffb3;
    color: black;
    font-weight: bold;
    padding: 6px 10px;
    border-radius: 4px;
    margin: 0 18px 18px;
    display: inline-block;
    font-size: 12px;
}

footer {
    text-align: center;
    padding: 30px;
    color: #777;
}
</style>
</head>

<body id="accueil">

<header>
    <div class="logo">SYS STUDIO</div>

    <nav>
        <a href="#accueil">ACCUEIL</a>
        <a href="#scripts" class="active">NOS SCRIPTS</a>
    </nav>

    <a href="#" class="discord">Discord</a>
</header>

<div class="container">

    <input class="search" type="text" placeholder="🔍 Rechercher un script...">

    <div class="grid" id="scripts">

        <div class="card">
            <div class="image">
                <span>Message<br>Anonyme</span>
            </div>

            <div class="info">
                <h2>Message Anonyme</h2>
                <div class="price">FREE</div>
            </div>

            <div class="badge">En préparation</div>
        </div>

    </div>
</div>

<footer>
    © 2025 SYS STUDIO • Scripts FiveM
</footer>

</body>
</html>
